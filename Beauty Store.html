<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>My Beauty Store</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f5f5f5;
            text-align: center;
        }

        header {
            background-color: black;
            color: white;
            padding: 15px;
            font-size: 20px;
        }

        .search-box {
            margin: 15px;
        }

        input {
            width: 80%;
            padding: 10px;
            border-radius: 20px;
            border: 1px solid #ccc;
        }

        h2 {
            margin-top: 20px;
        }

        .categories {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
            padding: 20px;
        }

        .card {
            background: white;
            padding: 15px;
            border-radius: 15px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }

        .card img {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
        }

        .card h3 {
            margin-top: 10px;
        }
    </style>
</head>

<body>

<header>
    My Beauty Store
</header>

<div class="search-box">
    <input type="text" placeholder="I'm looking for...">
</div>

<h2>Shop By Category</h2>

<div class="categories">

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Makeup">
        <h3>Makeup</h3>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Skincare">
        <h3>Skincare</h3>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Haircare">
        <h3>Haircare</h3>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Fragrance">
        <h3>Fragrance</h3>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Accessories">
        <h3>Accessories</h3>
    </div>

    <div class="card">
        <img src="https://via.placeholder.com/150" alt="Gifting">
        <h3>Gifting</h3>
    </div>

</div>

</body>
</html>
