<!DOCTYPE html>
<html>
    <head>
        <title>Google-Edit</title>

        <style>
            .google-image{
                text-align: center;
            }
            .google-image img{
                width: 200px;
                height: auto;
            }
            .search-box{
                width: 500px;             
                height: 40px;              
                padding: 0 15px;           
                border-radius: 40px;
                border-style: solid;
            }
            .google-it{
                text-align: center;
            }
            .example-one{
                padding-left: 10px;
                padding-right: 10px;
                padding-top: 5px;
                padding-bottom: 5px;
                font-weight: bolder;
                border-radius: 2px;
                background-color: rgb(226, 224, 224);
                border-style: solid;
                border-color: rgb(226, 224, 224);
                margin-right: 8px;

            }
            .example-two{
                padding-left: 10px;
                padding-right: 10px;
                padding-top: 5px;
                padding-bottom: 5px;
                font-weight: bolder;
                border-radius: 2px;
                background-color: rgb(226, 224, 224);
                border-style: solid;
                border-color: rgb(226, 224, 224);
            }
            .iframe{
                height: 400px;
                width: 400px;
            }

        </style>
    </head>
    <body>
        <p class="google-image"><img src="pics/google-logo1.png"></p>
        <div class="google-it">
    <p><input type="text" class="search-box" placeholder="Search Google or type a URL"></p>
        <p class="example">
            <button class="example-one">Google Search</button>
            <button class="example-two">I'm Feeling Lucky</button>
        </p>
        <iframe class="iframe" src="Student Form.html" title="Student Data"></iframe>
        </div>
        
        
    </body>
</html>
