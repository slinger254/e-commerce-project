<!DOCTYPE html>
<html>
    <head>
        <title>Flexbox</title>
        <style>
            .flexbox-container1{
                display: flex;
                flex-direction: row;
                margin-top: 30px;
                justify-content: end;
            }
            .flexbox-container2{
                display: flex;
                flex-direction: row;
                margin-top: 30px;
                justify-content: start;
            }
            .flexbox-container3{
                display: flex;
                flex-direction: row;
                margin-top: 30px;
                justify-content: space-between;
            }
            .div-1{
                background-color: lightcoral;
                width: 150px;
            }
            .div-2{
                background-color: aqua;
                width: 130px;
            }
            .div-3{
                background-color: lightcoral;
                width: 150px;
                float: left;
            }
        </style>
    </head>
    <body>
        <div class="flexbox-container1">
            <div class="div-1">div 1</div>
            <div class="div-2">div 2</div>
            <div class="div-3">div 3</div>
            
            </div>

        <div class="flexbox-container2"> 
            <div class="div-1">div 1</div>
            <div class="div-2">div 2
                <p>text box</p>
            </div>
            <div class="div-3">div 3</div>
            </div>
        <div class="flexbox-container3">
         <div class="div-1">div 1</div>
            <div class="div-2">div 2
                <p>text box</p>
            </div>
            <div class="div-3">div 3</div>
            </div>
        
         
        
    </body>
</html>
