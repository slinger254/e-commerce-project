<!DOCTYPE html>
<html>
    <head>
        <title>Grid Practice</title>
        <style>
            .big-div{
                display: grid;
                grid-template-columns: 1fr 1fr 1fr;
                column-gap: 20px;
                margin-top: 30px;
            }
            .div-1{
                background-color: aqua;
                height: 150px; 
            }
            .div-2{
                background-color: lightcoral;
                height: 150px;
            }
            .div-3{
                background-color: rgb(12, 184, 118);
                height: 150px;
            }
        </style>
    </head>



    <body style="padding-bottom: 100px;">
        <div class="big-div">
            <div class="div-1">div 1</div>
            <div class="div-2">div 2</div>
            <div class="div-3">div 3</div>
        </div>
        <div class="big-div">
            <div class="div-1">div 1</div>
            <div class="div-2">div 2</div>
            <div class="div-3">div 3</div>
        </div>
        <div class="big-div">
            <div class="div-1">div 1</div>
            <div class="div-2">div 2</div>
            <div class="div-3">div 3</div>
        </div>
    </body>
</html>
