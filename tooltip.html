<!DOCTYPE html>
<html>
    <head>
        <title>Tooltip</title>
        <style>
            .download-div{
                position: relative;
                width: 100px;
            }
            .download-button{
                background-color: rgb(50, 50, 228);
                color: white;
                padding-left: 8px;
                padding-right: 8px;
                padding-bottom: 4px;
                padding-top: 4px;
                font-size: 13px;
                font-family: Arial, Helvetica, sans-serif;
                border-style: solid;
                border-color: rgb(50, 50, 228);
                border-radius: 4px;
                position: relative;
            }
            .download-button:hover{
                background-color: rgb(96, 96, 221);
                border-color: rgb(96, 96, 221);
                cursor: pointer;
            }
            .download-tooltip{
                color: white;
                background-color: grey;
                padding-left: 6px;
                padding-right: 6px;
                padding-bottom: 3px;
                padding-top: 3px;
                font-size: 10px;
                font-family: Arial, Helvetica, sans-serif;
                position: absolute;
                bottom: -20px;
                right: 35px;
                opacity: 0;
                pointer-events: none;
            }
            .download-div:hover .download-tooltip{
                opacity: 1;
            }
        </style>
    </head>
    <body>
    <div class="download-div">
        <button class="download-button">Download</button>
        <div class="download-tooltip">Download</div>
    </div>
    </body>
</html>
